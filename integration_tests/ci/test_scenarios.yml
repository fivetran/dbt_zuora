schema_variable_name: "zuora_schema"

include_databricks_sql: false
include_sqlserver: false

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: false

  - name: "features disabled"
    vars:
      zuora__standardized_billing_model_enabled: false
      zuora__using_credit_balance_adjustment: false
      zuora__using_taxation_item: false
      zuora__using_refund: false
      zuora__using_refund_invoice_payment: false
    include_incremental: false